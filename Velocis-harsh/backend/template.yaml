AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Velocis Backend — AI-powered CI/CD monitoring platform

# ─────────────────────────────────────────────
# GLOBAL DEFAULTS
# Applied to all Lambda functions unless overridden
# ─────────────────────────────────────────────

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 30
    MemorySize: 256
    Architectures:
      - arm64
    Environment:
      Variables:
        NODE_ENV: !Ref NodeEnv
        AWS_ACCOUNT_ID: !Ref AWS::AccountId
        GITHUB_APP_ID: !Ref GitHubAppId
        GITHUB_CLIENT_ID: !Ref GitHubClientId
        GITHUB_CLIENT_SECRET: !Ref GitHubClientSecret
        GITHUB_WEBHOOK_SECRET: !Ref GitHubWebhookSecret
        GITHUB_APP_PRIVATE_KEY: !Ref GitHubAppPrivateKey
        GITHUB_OAUTH_REDIRECT_URI: !Ref GitHubOAuthRedirectUri
        TOKEN_ENCRYPTION_KEY: !Ref TokenEncryptionKey
        DYNAMO_REPOSITORIES_TABLE: !Ref RepositoriesTable
        DYNAMO_USERS_TABLE: !Ref UsersTable
        DYNAMO_AI_ACTIVITY_TABLE: !Ref AIActivityTable
        FRONTEND_URL: !Ref FrontendUrl
        ALLOWED_ORIGINS: !Ref AllowedOrigins
  Api:
    Cors:
      AllowOrigin: !Sub "'${AllowedOrigins}'"
      AllowHeaders: "'Content-Type,Authorization,Cookie'"
      AllowMethods: "'GET,POST,OPTIONS'"
      AllowCredentials: "'true'"

# ─────────────────────────────────────────────
# PARAMETERS
# Injected at deploy time — never hardcoded
# ─────────────────────────────────────────────

Parameters:
  NodeEnv:
    Type: String
    Default: production
    AllowedValues: [development, production]

  GitHubAppId:
    Type: String
    Description: GitHub App ID (numeric string)

  GitHubClientId:
    Type: String
    Description: GitHub App Client ID (Iv23l...)

  GitHubClientSecret:
    Type: String
    NoEcho: true
    Description: GitHub App Client Secret

  GitHubWebhookSecret:
    Type: String
    NoEcho: true
    Description: GitHub Webhook HMAC secret

  GitHubAppPrivateKey:
    Type: String
    NoEcho: true
    Description: GitHub App RSA Private Key (PEM, newlines as \n)

  GitHubOAuthRedirectUri:
    Type: String
    Description: Full callback URL e.g. https://api.velocis.dev/api/auth/github/callback

  TokenEncryptionKey:
    Type: String
    NoEcho: true
    Description: 64-char hex AES-256 encryption key for storing OAuth tokens

  FrontendUrl:
    Type: String
    Default: https://velocis.dev
    Description: Deployed frontend URL for CORS and redirects

  AllowedOrigins:
    Type: String
    Default: https://velocis.dev
    Description: Comma-separated CORS origins

# ─────────────────────────────────────────────
# RESOURCES
# ─────────────────────────────────────────────

Resources:

  # ── API GATEWAY ──────────────────────────────────────────────────────────────
  # Single HTTP API — all Lambda handlers route through this

  VelocisApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: velocis-api
      StageName: v1
      Description: Velocis GitHub Integration API
      Auth:
        DefaultAuthorizer: NONE
      Cors:
        AllowOrigin: !Sub "'${AllowedOrigins}'"
        AllowHeaders: "'Content-Type,Authorization,Cookie,X-Requested-With'"
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowCredentials: "'true'"
        MaxAge: "'600'"

  # ── AUTH LAMBDAS ─────────────────────────────────────────────────────────────

  # GET /api/auth/github
  # Step 1 of OAuth: generate CSRF state + redirect to GitHub's authorization page
  AuthGithubFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: velocis-auth-github
      Description: Initiates GitHub OAuth flow — generates CSRF state and redirects to GitHub
      CodeUri: src/handlers/api/
      Handler: authGithub.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
      Events:
        AuthGithub:
          Type: Api
          Properties:
            RestApiId: !Ref VelocisApi
            Path: /api/auth/github
            Method: GET

  # GET /api/auth/github/callback
  # Step 2 of OAuth: validate state, exchange code, create/update user, set session cookie
  AuthGithubCallbackFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: velocis-auth-github-callback
      Description: Handles GitHub OAuth callback — exchanges code, saves user, sets session
      CodeUri: src/handlers/api/
      Handler: authGithubCallback.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref RepositoriesTable
      Events:
        AuthGithubCallback:
          Type: Api
          Properties:
            RestApiId: !Ref VelocisApi
            Path: /api/auth/github/callback
            Method: GET

  # ── WEBHOOK LAMBDAS ──────────────────────────────────────────────────────────

  # POST /webhooks/github/push
  # Fired by GitHub on every push — triggers Sentinel + Fortress + Cortex agents
  GitHubPushWebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: velocis-webhook-github-push
      Description: Orchestrates tri-agent pipeline on GitHub push events
      CodeUri: src/handlers/webhooks/
      Handler: githubPush.handler
      Timeout: 60              # Agents need more time than default 30s
      MemorySize: 512          # AI workload needs more memory
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RepositoriesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AIActivityTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource: "*"
      Events:
        GithubPush:
          Type: Api
          Properties:
            RestApiId: !Ref VelocisApi
            Path: /webhooks/github/push
            Method: POST

  # ── DATA API LAMBDAS ─────────────────────────────────────────────────────────

  # GET /api/repos
  # Returns all repositories for the authenticated user (dashboard data)
  GetCortexDataFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: velocis-api-cortex
      Description: Returns Cortex graph data and repository list for dashboard
      CodeUri: src/handlers/api/
      Handler: getCortexData.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref RepositoriesTable
        - DynamoDBReadPolicy:
            TableName: !Ref AIActivityTable
        - DynamoDBReadPolicy:
            TableName: !Ref UsersTable
      Events:
        GetCortex:
          Type: Api
          Properties:
            RestApiId: !Ref VelocisApi
            Path: /api/cortex/{repoId}
            Method: GET

  # GET /api/cost-forecast
  GetCostForecastFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: velocis-api-cost-forecast
      Description: Returns IaC cost prediction for a repository
      CodeUri: src/handlers/api/
      Handler: getCostForecast.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref RepositoriesTable
        - DynamoDBReadPolicy:
            TableName: !Ref UsersTable
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: "*"
      Events:
        GetCostForecast:
          Type: Api
          Properties:
            RestApiId: !Ref VelocisApi
            Path: /api/cost-forecast/{repoId}
            Method: GET

  # POST /api/chat
  PostChatMessageFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: velocis-api-chat
      Description: Multilingual mentor chat powered by Claude via Bedrock
      CodeUri: src/handlers/api/
      Handler: postChatMessage.handler
      Timeout: 60
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref UsersTable
        - DynamoDBReadPolicy:
            TableName: !Ref RepositoriesTable
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
                - translate:TranslateText
              Resource: "*"
      Events:
        PostChat:
          Type: Api
          Properties:
            RestApiId: !Ref VelocisApi
            Path: /api/chat
            Method: POST

  # ── DYNAMODB TABLES ──────────────────────────────────────────────────────────

  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: velocis-users
      BillingMode: PAY_PER_REQUEST
      DeletionProtectionEnabled: true     # Prevent accidental drops in production
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true   # 35-day PITR backup
      SSESpecification:
        SSEEnabled: true                   # Encryption at rest (AES-256 by AWS KMS)
      AttributeDefinitions:
        - AttributeName: githubId
          AttributeType: S
        - AttributeName: email
          AttributeType: S
        - AttributeName: username
          AttributeType: S
      KeySchema:
        - AttributeName: githubId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: email-index
          KeySchema:
            - AttributeName: email
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: username-index
          KeySchema:
            - AttributeName: username
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  RepositoriesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: velocis-repositories
      BillingMode: PAY_PER_REQUEST
      DeletionProtectionEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: repoId
          AttributeType: S
        - AttributeName: ownerGithubId
          AttributeType: S
        - AttributeName: repoFullName
          AttributeType: S
      KeySchema:
        - AttributeName: repoId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: userId-index
          KeySchema:
            - AttributeName: ownerGithubId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: repoFullName-index
          KeySchema:
            - AttributeName: repoFullName
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  AIActivityTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: velocis-ai-activity
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: activityId
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: S
        - AttributeName: repoId
          AttributeType: S
        - AttributeName: ownerGithubId
          AttributeType: S
      KeySchema:
        - AttributeName: activityId
          KeyType: HASH
        - AttributeName: createdAt
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: repoId-createdAt-index
          KeySchema:
            - AttributeName: repoId
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: userId-createdAt-index
          KeySchema:
            - AttributeName: ownerGithubId
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true  # Records auto-expire after 90 days

# ─────────────────────────────────────────────
# OUTPUTS
# Available after deployment via CloudFormation
# ─────────────────────────────────────────────

Outputs:
  ApiBaseUrl:
    Description: Base URL of the Velocis API Gateway
    Value: !Sub "https://${VelocisApi}.execute-api.${AWS::Region}.amazonaws.com/v1"
    Export:
      Name: VelocisApiBaseUrl

  GitHubLoginUrl:
    Description: Full URL for the GitHub OAuth login button
    Value: !Sub "https://${VelocisApi}.execute-api.${AWS::Region}.amazonaws.com/v1/api/auth/github"

  WebhookUrl:
    Description: Set this as the Webhook URL in your GitHub App settings
    Value: !Sub "https://${VelocisApi}.execute-api.${AWS::Region}.amazonaws.com/v1/webhooks/github/push"

  UsersTableArn:
    Description: ARN of the Users DynamoDB table
    Value: !GetAtt UsersTable.Arn

  RepositoriesTableArn:
    Description: ARN of the Repositories DynamoDB table
    Value: !GetAtt RepositoriesTable.Arn
