name: Deploy Backend to AWS Lambda

on:
  push:
    branches:
      - main
      - master
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"

  # Allow triggering manually from the GitHub Actions tab
  workflow_dispatch:

# Only run one deployment at a time; cancel any in-progress run for the same branch
concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # JOB 1 — Build & test
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Type-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: TypeScript type-check
        working-directory: backend
        run: npx tsc --noEmit

      - name: Compile TypeScript → dist/
        working-directory: backend
        run: npm run build

      # Install only production deps inside dist/ so the Lambda zip is lean
      - name: Install production deps inside dist/
        working-directory: backend
        run: |
          cp package.json dist/
          cp package-lock.json dist/
          cd dist && npm ci --omit=dev --prefer-offline

      # Upload the compiled artifact so the deploy job can reuse it
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: backend/dist/
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2 — SAM deploy (runs only after build passes)
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: SAM Deploy → AWS Lambda
    runs-on: ubuntu-latest
    needs: build

    # Required secrets (set in GitHub → Settings → Secrets & Variables → Actions):
    #   AWS_ACCESS_KEY_ID        — IAM user access key (needs SAM/CF/Lambda/DynamoDB/SSM permissions)
    #   AWS_SECRET_ACCESS_KEY    — matching secret key
    #   AWS_REGION               — e.g. ap-south-1
    #   SAM_S3_BUCKET            — existing S3 bucket for SAM artifacts, e.g. velocis-sam-artifacts
    #   FRONTEND_ORIGIN          — your Amplify URL, e.g. https://main.d1abc.amplifyapp.com
    #   GITHUB_OAUTH_REDIRECT    — e.g. https://main.d1abc.amplifyapp.com/auth/callback

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-dist
          path: backend/dist/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup AWS SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: SAM Deploy
        working-directory: backend
        run: |
          sam deploy \
            --template-file template.yaml \
            --stack-name velocis-backend \
            --s3-bucket "${{ secrets.SAM_S3_BUCKET }}" \
            --s3-prefix velocis-backend \
            --region "${{ secrets.AWS_REGION }}" \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              Environment=production \
              "FrontendOrigin=${{ secrets.FRONTEND_ORIGIN }}" \
              "GithubOAuthRedirectUri=${{ secrets.GITHUB_OAUTH_REDIRECT }}"

      - name: Print API Gateway URL
        working-directory: backend
        run: |
          echo "Deployed API URL:"
          aws cloudformation describe-stacks \
            --stack-name velocis-backend \
            --region "${{ secrets.AWS_REGION }}" \
            --query "Stacks[0].Outputs[?OutputKey=='ApiBaseUrl'].OutputValue" \
            --output text
